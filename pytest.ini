[pytest]

testpaths = tests

python_files = test_*.py

python_classes = Test*

python_functions = test_*

addopts =
    -v
    --tb=short
    --html=reports/html/report.html
    --self-contained-html
    --alluredir=allure-results

markers =
    homepage: Homepage validation tests
    navigation: Book navigation tests
    consistency: Data consistency tests
    links: Broken link tests
    images: Image validation tests